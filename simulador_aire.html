<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Efecto Cañón Urbano (2D)</title>
  <style>
    :root {
      --bg: #eaf4ff;
      --panel: #ffffff;
      --text: #133b5c;
      --accent: #1f78d1;
      --air: #4fc3f7;
      --line: #0288d1;
      --ground: #6d4c41;
      --building: #8d6e63;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #dcedff, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      padding: 16px;
    }

    #panel {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      padding: 16px;
      align-self: start;
    }

    h1 {
      font-size: 1.1rem;
      margin: 0 0 12px 0;
      color: #0f2f49;
    }

    .control { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input[type="range"] { width: 100%; }

    .value {
      font-weight: normal;
      color: #445;
      margin-left: 6px;
    }

    .legend {
      background: #f1f7fd;
      border-left: 4px solid var(--accent);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.3;
    }

    #scene-wrap {
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #scene {
      width: 100%;
      height: calc(100vh - 56px);
      min-height: 420px;
      border-radius: 8px;
      background: linear-gradient(180deg, #cde7ff 0%, #f7fbff 70%);
      border: 1px solid #c7d9eb;
    }

    #status {
      font-size: 0.9rem;
      color: #244a68;
      min-height: 20px;
    }

    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
      }
      #scene {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <aside id="panel">
    <h1>Simulador: efecto cañón urbano</h1>

    <div class="control">
      <label for="h1">Altura edificio 1 <span class="value" id="v1"></span></label>
      <input id="h1" type="range" min="60" max="320" value="220" />
    </div>

    <div class="control">
      <label for="h2">Altura edificio 2 <span class="value" id="v2"></span></label>
      <input id="h2" type="range" min="60" max="320" value="160" />
    </div>

    <div class="control">
      <label for="h3">Altura edificio 3 <span class="value" id="v3"></span></label>
      <input id="h3" type="range" min="60" max="320" value="250" />
    </div>

    <div class="control">
      <label for="gap12">Espacio entre edificio 1 y 2 <span class="value" id="vg12"></span></label>
      <input id="gap12" type="range" min="40" max="240" value="120" />
    </div>

    <div class="control">
      <label for="gap23">Espacio entre edificio 2 y 3 <span class="value" id="vg23"></span></label>
      <input id="gap23" type="range" min="40" max="240" value="90" />
    </div>

    <div class="legend">
      Las líneas azules muestran el movimiento del aire en un corte 2D de la ciudad.
      
      <br><br>
      Espacios pequeños y edificios altos tienden a aumentar remolinos y estancamiento.
    </div>
  </aside>

  <main id="scene-wrap">
    <canvas id="scene" width="1200" height="720" aria-label="Simulación 2D del efecto cañón urbano"></canvas>
    <div id="status"></div>
  </main>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const controls = {
      h1: document.getElementById('h1'),
      h2: document.getElementById('h2'),
      h3: document.getElementById('h3'),
      gap12: document.getElementById('gap12'),
      gap23: document.getElementById('gap23')
    };

    const labels = {
      v1: document.getElementById('v1'),
      v2: document.getElementById('v2'),
      v3: document.getElementById('v3'),
      vg12: document.getElementById('vg12'),
      vg23: document.getElementById('vg23')
    };

    const statusEl = document.getElementById('status');
    const groundY = () => canvas.height - 80;
    const buildingWidth = 130;

    function readState() {
      return {
        h1: Number(controls.h1.value),
        h2: Number(controls.h2.value),
        h3: Number(controls.h3.value),
        gap12: Number(controls.gap12.value),
        gap23: Number(controls.gap23.value)
      };
    }

    function updateLabels(s) {
      labels.v1.textContent = `${s.h1} px`;
      labels.v2.textContent = `${s.h2} px`;
      labels.v3.textContent = `${s.h3} px`;
      labels.vg12.textContent = `${s.gap12} px`;
      labels.vg23.textContent = `${s.gap23} px`;
    }

    function drawArrow(x, y, dx, dy, intensity) {
      const len = Math.hypot(dx, dy);
      if (len < 0.1) return;
      const ux = dx / len;
      const uy = dy / len;
      const tipX = x + dx;
      const tipY = y + dy;

      ctx.strokeStyle = `rgba(2,136,209,${0.35 + intensity * 0.5})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();

      const ah = 6;
      ctx.fillStyle = `rgba(2,136,209,${0.45 + intensity * 0.5})`;
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - ux * ah - uy * ah * 0.7, tipY - uy * ah + ux * ah * 0.7);
      ctx.lineTo(tipX - ux * ah + uy * ah * 0.7, tipY - uy * ah - ux * ah * 0.7);
      ctx.closePath();
      ctx.fill();
    }

    function drawBuildings(s) {
      const y0 = groundY();
      const total = buildingWidth * 3 + s.gap12 + s.gap23;
      const startX = (canvas.width - total) / 2;

      const b1 = { x: startX, y: y0 - s.h1, w: buildingWidth, h: s.h1 };
      const b2 = { x: b1.x + buildingWidth + s.gap12, y: y0 - s.h2, w: buildingWidth, h: s.h2 };
      const b3 = { x: b2.x + buildingWidth + s.gap23, y: y0 - s.h3, w: buildingWidth, h: s.h3 };

      const buildings = [b1, b2, b3];

      ctx.fillStyle = '#4b342d';
      ctx.fillRect(0, y0, canvas.width, canvas.height - y0);

      buildings.forEach((b, i) => {
        ctx.fillStyle = ['#7b5a51', '#8d6e63', '#6d4c41'][i];
        ctx.fillRect(b.x, b.y, b.w, b.h);

        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        for (let wy = b.y + 14; wy < y0 - 8; wy += 16) {
          for (let wx = b.x + 12; wx < b.x + b.w - 12; wx += 18) {
            ctx.fillRect(wx, wy, 8, 8);
          }
        }
      });

      return buildings;
    }

    function drawAirFlow(s, buildings, t) {
      const y0 = groundY();
      const maxH = Math.max(s.h1, s.h2, s.h3);
      const roughness = (maxH / 320) * 0.7 + ((240 - (s.gap12 + s.gap23) / 2) / 240) * 0.6;

      for (let gy = 90; gy < y0 - 20; gy += 34) {
        for (let gx = 40; gx < canvas.width - 40; gx += 34) {
          const underRoof = gy > y0 - maxH - 30;
          let speed = underRoof ? 7.5 : 11;
          let vx = speed;
          let vy = Math.sin((gx * 0.018) + (gy * 0.025) + t * 0.0018) * 1.2;

          for (const b of buildings) {
            const inX = gx > b.x - 24 && gx < b.x + b.w + 24;
            const inY = gy > b.y - 24 && gy < y0 + 10;
            if (inX && inY) {
              const distTop = Math.max(4, Math.abs(gy - b.y));
              const push = 90 / distTop;
              vy -= push * 0.18;
              vx *= 0.38;
            }

            const wakeX = gx > b.x + b.w && gx < b.x + b.w + 120;
            const wakeY = gy > b.y - 10 && gy < y0;
            if (wakeX && wakeY) {
              const phase = (gx - (b.x + b.w)) * 0.09 + gy * 0.03 + t * 0.0025;
              vx *= 0.5;
              vy += Math.sin(phase) * (2.4 + roughness * 2.8);
            }
          }

          const isStreetCanyon1 = gx > buildings[0].x + buildings[0].w && gx < buildings[1].x;
          const isStreetCanyon2 = gx > buildings[1].x + buildings[1].w && gx < buildings[2].x;

          if ((isStreetCanyon1 || isStreetCanyon2) && gy > y0 - Math.max(s.h1, s.h2, s.h3) + 40) {
            const swirl = Math.sin((gy + t * 0.12) * 0.07);
            vx *= 0.35;
            vy += swirl * (3 + roughness * 3.5);
          }

          drawArrow(gx, gy, vx, vy, Math.min(1, Math.hypot(vx, vy) / 12));
        }
      }
    }

    function draw(t = 0) {
      const s = readState();
      updateLabels(s);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const buildings = drawBuildings(s);
      drawAirFlow(s, buildings, t);

      const canyonIndex = ((s.h1 + s.h2 + s.h3) / 3) / ((s.gap12 + s.gap23) / 2);
      const estado = canyonIndex > 2.1 ? 'Efecto cañón intenso' : canyonIndex > 1.25 ? 'Efecto cañón moderado' : 'Buena ventilación';
      statusEl.textContent = `Índice cañón urbano: ${canyonIndex.toFixed(2)} · ${estado}`;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw(performance.now());
    }

    Object.values(controls).forEach(input => input.addEventListener('input', () => draw(performance.now())));
    window.addEventListener('resize', resizeCanvas);

    function loop(ts) {
      draw(ts);
      requestAnimationFrame(loop);
    }

    resizeCanvas();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
